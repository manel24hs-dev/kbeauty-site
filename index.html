<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K-Beauty Glow</title>

<style>

body {

    margin: 0;

    font-family: Arial, sans-serif;

    background: #fff6f8;

}

/* HEADER */

header {

    background: linear-gradient(135deg, #ffb6c1, #ff69b4);

    color: white;

    text-align: center;

    padding: 20px;

}

/* PANIER */

.cart {

    position: fixed;

    right: 10px;

    top: 10px;

    background: white;

    padding: 10px;

    border-radius: 10px;

    box-shadow: 0 5px 15px rgba(0,0,0,0.2);

    font-size: 14px;

}

/* PRODUITS */

.products {

    display: flex;

    justify-content: center;

    gap: 20px;

    padding: 20px;

    flex-wrap: wrap;

}

/* CARD */

.product-card {

    background: white;

    width: 250px;

    border-radius: 15px;

    box-shadow: 0 5px 15px rgba(0,0,0,0.1);

    padding: 15px;

    text-align: center;

}

/* IMAGE */

.product-card img {

    width: 100%;

    height: 200px;

    object-fit: cover;

    border-radius: 10px;

}

/* BOUTON */

button {

    margin-top: 10px;

    padding: 10px;

    border: none;

    background: #ff69b4;

    color: white;

    border-radius: 10px;

    cursor: pointer;

}

button:hover {

    background: #ff4f9a;

}

</style>

</head>

<body>

<header>

    <h1>K-Beauty Glow ✨</h1>

    <p>Sérums coréens pour une peau parfaite</p>

</header>

<!-- PANIER -->

<div class="cart">

    🛒 Panier : <span id="count">0</span> article(s)<br>

    Total : <span id="total">0</span> €

</div>

<section class="products">

    <!-- PRODUIT 1 -->

    <div class="product-card">

        <img src="IMG_1730.jpeg">

        <h3>Sérum Hydratant</h3>

        <p>20€</p>

        <button onclick="addToCart(20)">Ajouter au panier</button>

    </div>

    <!-- PRODUIT 2 -->

    <div class="product-card">

        <img src="IMG_1728.jpeg">

        <h3>Sérum Glow</h3>

        <p>25€</p>

        <button onclick="addToCart(25)">Ajouter au panier</button>

    </div>

</section>

<script>

let total = 0;

let count = 0;

function addToCart(price) {

    total += price;

    count += 1;

    document.getElementById("total").innerText = total;

    document.getElementById("count").innerText = count;

}

</script>

</body>

</html>
