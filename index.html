<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetShop Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f7fa;
}

header {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    text-align: center;
    padding: 25px;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.product {
    background: white;
    width: 260px;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* 🔥 IMAGES PARFAITES */
.product img {
    width: 100%;
    height: 200px;
    object-fit: contain;
    background: white;
    border-radius: 10px;
    padding: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #00b894;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #019875;
}

.cart-btn {
    margin: 15px;
    text-align: center;
}

.cart-btn button {
    background: #0984e3;
}

.product:hover {
    transform: scale(1.05);
    transition: 0.3s;
}
</style>

</head>

<body>

<header>
    <h1>🐶 PetShop Pro</h1>
    <p>Les indispensables pour ton animal</p>
</header>

<div class="cart-btn">
    <a href="panier.html">
        <button>🛒 Voir le panier</button>
    </a>
</div>

<section class="products">

    <!-- PRODUIT 1 -->
<div class="product">
    <img src="IMG_1760.jpeg">
    <h3>Coupe-ongles LED</h3>
    <p>Coupe sans risque grâce à la lumière LED</p>
    <p><strong>9.99€</strong></p>
    <button onclick="addToCart('Coupe-ongles LED', 9.99)">Ajouter</button>
</div>

<!-- PRODUIT 2 -->
<div class="product">
    <img src="IMG_1761.jpeg">
    <h3>Ceinture sécurité chien</h3>
    <p>Protège ton chien en voiture</p>
    <p><strong>7.99€</strong></p>
    <button onclick="addToCart('Ceinture chien', 7.99)">Ajouter</button>
</div>

<!-- PRODUIT 3 -->
<div class="product">
    <img src="IMG_1759.jpeg">
    <h3>Ramasse-crottes</h3>
    <p>Facile, rapide et hygiénique</p>
    <p><strong>12.99€</strong></p>
    <button onclick="addToCart('Ramasse crottes', 12.99)">Ajouter</button>
</div>

</section>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price) {
    let found = cart.find(p => p.name === name);

    if(found){
        found.qty++;
    } else {
        cart.push({name, price, qty:1});
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Ajouté au panier 🐶");
}
</script>

</body>
</html>
