<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>K-Beauty Glow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #fff8f5;
        }

        header {
            background-color: #ffb6c1;
            padding: 20px;
            text-align: center;
            color: white;
        }

        nav {
            background-color: #ffe4e1;
            padding: 10px;
            text-align: center;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 50px;
        }

        .hero h1 {
            color: #ff69b4;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .product {
            background: white;
            border-radius: 10px;
            padding: 15px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .product img {
            width: 100%;
            border-radius: 10px;
        }

        footer {
            background-color: #ffb6c1;
            text-align: center;
            padding: 10px;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>K-Beauty Glow ✨</h1>
    <p>Crèmes coréennes pour une peau parfaite</p>
</header>

<nav>
    <a href="#">Accueil</a>
    <a href="#">Produits</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h1>Hydratation & Glow coréen 🇰🇷</h1>
    <p>Découvrez les meilleures crèmes inspirées des rituels coréens</p>
</section>

<section class="products">
    <div class="product">
        <img src="https://images.unsplash.com/photo-1556228578-8c89e6adf883?auto=format&fit=crop&w=400" alt="crème coréenne">

    <div class="product">
        <img src="https://images.unsplash.com/photo-1620916566398-39f1143ab7be?auto=format&fit=crop&w=400" alt="crème coréenne">

    <div class="product">
        <img src="https://images.unsplash.com/photo-1616683693504-3ea7e9ad6fec?auto=format&fit=crop&w=400" alt="crème coréenne">
</section>

<footer>
    <p>© 2026 K-Beauty Glow</p>
</footer>

</body>
</html>
