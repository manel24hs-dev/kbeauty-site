<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K-Beauty Glow</title>

<style>

body {

    margin: 0;

    font-family: Arial, sans-serif;

    background: #fff6f8;

}

/* HEADER */

header {

    background: linear-gradient(135deg, #ffb6c1, #ff69b4);

    color: white;

    text-align: center;

    padding: 20px;

}

/* PANIER BOX */

.cart-box {

    position: fixed;

    right: 10px;

    top: 10px;

    background: white;

    padding: 15px;

    border-radius: 10px;

    width: 220px;

    box-shadow: 0 5px 15px rgba(0,0,0,0.2);

}

.cart-item {

    font-size: 13px;

    margin-bottom: 5px;

    display: flex;

    justify-content: space-between;

}

/* PRODUITS */

.products {

    display: flex;

    justify-content: center;

    gap: 20px;

    padding: 20px;

    flex-wrap: wrap;

}

/* CARD */

.product-card {

    background: white;

    width: 250px;

    border-radius: 15px;

    box-shadow: 0 5px 15px rgba(0,0,0,0.1);

    padding: 15px;

    text-align: center;

}

/* IMAGE */

.product-card img {

    width: 100%;

    height: 200px;

    object-fit: cover;

    border-radius: 10px;

}

/* BOUTON */

button {

    margin-top: 10px;

    padding: 8px;

    border: none;

    background: #ff69b4;

    color: white;

    border-radius: 8px;

    cursor: pointer;

}

button:hover {

    background: #ff4f9a;

}

.remove-btn {

    background: red;

    font-size: 10px;

    padding: 2px 5px;

}

</style>

</head>

<body>

<header>

    <h1>K-Beauty Glow ✨</h1>

    <p>Sérums coréens</p>

</header>

<!-- PANIER -->

<div class="cart-box">

    <strong>🛒 Panier</strong>

    <div id="cart-items"></div>

    <hr>

    Total : <span id="total">0</span> €

</div>

<section class="products">

    <div class="product-card">

        <img src="IMG_1730.jpeg">

        <h3>Sérum Hydratant</h3>

        <p>20€</p>

        <button onclick="addToCart('Sérum Hydratant', 20)">Ajouter</button>

    </div>

    <div class="product-card">

        <img src="IMG_1728.jpeg">

        <h3>Sérum Glow</h3>

        <p>25€</p>

        <button onclick="addToCart('Sérum Glow', 25)">Ajouter</button>

    </div>

</section>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {

    localStorage.setItem("cart", JSON.stringify(cart));

}

function addToCart(name, price) {

    cart.push({name, price});

    saveCart();

    displayCart();

}

function removeItem(index) {

    cart.splice(index, 1);

    saveCart();

    displayCart();

}

function displayCart() {

    let cartItems = document.getElementById("cart-items");

    let total = 0;

    cartItems.innerHTML = "";

    cart.forEach((item, index) => {

        total += item.price;

        cartItems.innerHTML += `

            <div class="cart-item">

                ${item.name} (${item.price}€)

                <button class="remove-btn" onclick="removeItem(${index})">X</button>

            </div>

        `;

    });

    document.getElementById("total").innerText = total;

}

// Charger le panier au démarrage

displayCart();

</script>

</body>

</html>
