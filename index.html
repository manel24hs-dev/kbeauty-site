<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Beauty Glow</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff6f8;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #ffb6c1, #ff69b4);
    color: white;
    text-align: center;
    padding: 25px;
}

/* TITRE */
header h1 {
    margin: 0;
}

/* PRODUITS */
.products {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

/* CARD PRODUIT */
.product-card {
    background: white;
    width: 250px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    padding: 15px;
    text-align: center;
}

/* IMAGE (IMPORTANT) */
.product-image {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
}

/* BOUTON */
button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: #ff69b4;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #ff4f9a;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: #ffb6c1;
    color: white;
    margin-top: 20px;
}
</style>

</head>

<body>

<header>
    <h1>K-Beauty Glow ✨</h1>
    <p>Sérums coréens pour une peau parfaite</p>
</header>

<section class="products">

    <!-- PRODUIT 1 -->
    <div class="product-card">
        <img src="IMG_1730.jpeg" alt="Sérum coréen" class="product-image">

        <h3>Sérum Hydratant</h3>

        <p>
            Sérum coréen qui hydrate et illumine la peau.
        </p>

        <p><strong>20€</strong></p>

        <button>Ajouter au panier</button>
    </div>

</section>

<footer>
    <p>© 2026 K-Beauty Glow</p>
</footer>

</body>
</html>
