<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Beauty Glow</title>

<style>
body { font-family: Arial; margin:0; background:#fff6f8; }

header {
    background: linear-gradient(135deg,#ffb6c1,#ff69b4);
    color:white;
    text-align:center;
    padding:20px;
}

.products {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card {
    background:white;
    width:250px;
    border-radius:15px;
    padding:10px;
    text-align:center;
}

.card img {
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
}

button {
    background:#ff69b4;
    color:white;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.cart-btn {
    text-align:center;
    margin:10px;
}
</style>
</head>

<body>

<header>
<h1>K-Beauty Glow ✨</h1>
<p>Sérums coréens</p>
</header>

<div class="cart-btn">
<a href="panier.html"><button>Voir le panier 🛒</button></a>
</div>

<div class="products">

<div class="card">
<img src="IMG_1730.jpeg">
<h3>Sérum Hydratant</h3>
<p>20€</p>
<button onclick="add('Sérum Hydratant',20,'IMG_1730.jpeg')">Ajouter</button>
</div>

<div class="card">
<img src="IMG_1728.jpeg">
<h3>Sérum Glow</h3>
<p>25€</p>
<button onclick="add('Sérum Glow',25,'IMG_1728.jpeg')">Ajouter</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function add(name,price,image){
    cart.push({name,price,image,qty:1});
    localStorage.setItem("cart",JSON.stringify(cart));
    alert("Ajouté !");
}
</script>

</body>
</html>
