<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K-Beauty Glow</title>

<style>

body {

    margin: 0;

    font-family: Arial;

    background: #fff6f8;

}

/* HEADER */

header {

    background: linear-gradient(135deg, #ffb6c1, #ff69b4);

    color: white;

    text-align: center;

    padding: 20px;

}

/* BOUTON PANIER */

.cart-link {

    text-align: center;

    margin: 15px;

}

.cart-link button {

    padding: 10px;

    background: #ff69b4;

    color: white;

    border: none;

    border-radius: 10px;

}

/* PRODUITS */

.products {

    display: flex;

    justify-content: center;

    gap: 20px;

    flex-wrap: wrap;

}

/* CARD */

.product-card {

    background: white;

    width: 250px;

    border-radius: 15px;

    padding: 15px;

    text-align: center;

}

/* IMAGE */

.product-card img {

    width: 100%;

    height: 200px;

    object-fit: cover;

    border-radius: 10px;

}

button {

    margin-top: 10px;

    padding: 10px;

    background: #ff69b4;

    color: white;

    border: none;

    border-radius: 10px;

}

</style>

</head>

<body>

<header>

    <h1>K-Beauty Glow ✨</h1>

    <p>Sérums coréens</p>

</header>

<div class="cart-link">

    <a href="panier.html">

        <button>Voir le panier 🛒</button>

    </a>

</div>

<section class="products">

    <div class="product-card">

        <img src="IMG_1730.jpeg">

        <h3>Sérum Hydratant</h3>

        <p>20€</p>

        <button onclick="addToCart('Sérum Hydratant', 20)">Ajouter</button>

    </div>

    <div class="product-card">

        <img src="IMG_1728.jpeg">

        <h3>Sérum Glow</h3>

        <p>25€</p>

        <button onclick="addToCart('Sérum Glow', 25)">Ajouter</button>

    </div>

</section>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name, price) {

    cart.push({name, price});

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("Produit ajouté au panier !");

}

</script>

</body>

</html>
