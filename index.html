<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiGlow Beauty</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#fff0f5,#ffffff);
}

header {
    text-align:center;
    padding:20px;
    background: rgba(255,105,180,0.15);
}

.logo {
    font-size:26px;
    font-weight:bold;
    color:#ff3d8b;
}

.section-title {
    text-align:center;
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
    color:#333;
}

.container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding:20px;
}

.card {
    width:260px;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3 {
    text-align:center;
}

.card p {
    text-align:center;
    color:gray;
}

button {
    width:100%;
    padding:10px;
    border:none;
    background:#ff69b4;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">🌸 MultiGlow K-Beauty</div>
<p>Skincare coréenne premium</p>
</header>

<!-- 🟣 ANCIENS PRODUITS (pas de titre comme demandé) -->
<div class="container">

<div class="card">
<img src="IMG_1730.jpeg">
<h3>Dynastic Eye Cream</h3>
<p>Contour des yeux</p>
<button onclick="add('Dynastic Eye Cream',22,'IMG_1730.jpeg')">Ajouter</button>
</div>

<div class="card">
<img src="IMG_1728.jpeg">
<h3>Resivive Eye Serum</h3>
<p>Ginseng + Rétinol</p>
<button onclick="add('Resivive Eye Serum',28,'IMG_1728.jpeg')">Ajouter</button>
</div>

</div>

<!-- 🌿 NOUVELLE GAMME -->
<div class="section-title">✨ Nouvelle gamme</div>

<div class="container">

<div class="card">
<img src="IMG_1731.jpeg">
<h3>Matte Sun Stick</h3>
<p>SPF + Mugwort + Camélia</p>
<button onclick="add('Matte Sun Stick',30,'IMG_1731.jpeg')">Ajouter</button>
</div>

<div class="card">
<img src="IMG_1732.jpeg">
<h3>Hydra Glow Toner</h3>
<p>Tonique hydratant éclat</p>
<button onclick="add('Hydra Glow Toner',18,'IMG_1732.jpeg')">Ajouter</button>
</div>

<div class="card">
<img src="IMG_1733.jpeg">
<h3>Peptide Repair Cream</h3>
<p>Crème réparatrice peptides</p>
<button onclick="add('Peptide Repair Cream',32,'IMG_1733.jpeg')">Ajouter</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function add(name,price,image){
    cart.push({name,price,image,qty:1});
    localStorage.setItem("cart",JSON.stringify(cart));
    alert("Ajouté au panier !");
}
</script>

</body>
</html>
