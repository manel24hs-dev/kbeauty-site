<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiGlow Beauty</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#fff0f5;
}

header{
    text-align:center;
    padding:20px;
    background:#ffb6c1;
}

.container{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:20px;
    flex-wrap:wrap;
}

.card{
    width:250px;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3,p{
    text-align:center;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#ff69b4;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🌸 MultiGlow Beauty</h1>

<a href="panier.html">
<button>Voir le panier 🛒</button>
</a>
</header>

<div class="container">

<!-- PRODUIT 1 -->
<div class="card">
<img src="IMG_1730.jpeg">
<h3>Produit 1</h3>
<p>Sérum soin visage</p>
<button onclick="add('Produit 1',25,'IMG_1730.jpeg')">Ajouter</button>
</div>

<!-- PRODUIT 2 -->
<div class="card">
<img src="IMG_1728.jpeg">
<h3>Produit 2</h3>
<p>Sérum contour yeux</p>
<button onclick="add('Produit 2',28,'IMG_1728.jpeg')">Ajouter</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function add(name,price,image){
    cart.push({name,price,image,qty:1});
    localStorage.setItem("cart",JSON.stringify(cart));
    alert("Ajouté au panier !");
}
</script>

</body>
</html>
