<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiGlow Beauty</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#fff0f5;
}

header{
    text-align:center;
    padding:20px;
    background:#ffb6c1;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    width:250px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3,p{
    text-align:center;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#ff69b4;
    color:white;
}
</style>
</head>

<body>

<header>
<h1>🌸 MultiGlow Beauty</h1>

<a href="panier.html">
<button>Voir le panier 🛒</button>
</a>
</header>

<div class="container">

<!-- 1 -->
<div class="card">
<img src="IMG_1730.jpeg">
<h3>Hydra Glow Toner</h3>
<p>Hydratation éclat</p>
<button onclick="add('Hydra Glow Toner',18,'hydra-glow-toner.jpeg')">Ajouter</button>
</div>

<!-- 2 -->
<div class="card">
<img src="peptide-cream.jpeg">
<h3>Peptide Cream</h3>
<p>Crème réparatrice</p>
<button onclick="add('Peptide Cream',32,'peptide-cream.jpeg')">Ajouter</button>
</div>

<!-- 3 -->
<div class="card">
<img src="matte-sun-stick.jpeg">
<h3>Matte Sun Stick</h3>
<p>SPF protection</p>
<button onclick="add('Matte Sun Stick',30,'matte-sun-stick.jpeg')">Ajouter</button>
</div>

<!-- 4 -->
<div class="card">
<img src="dynasty-cream.jpeg">
<h3>Dynasty Cream</h3>
<p>Contour des yeux</p>
<button onclick="add('Dynasty Cream',22,'dynasty-cream.jpeg')">Ajouter</button>
</div>

<!-- 5 -->
<div class="card">
<img src="revive-eye-serum.jpeg">
<h3>Revive Eye Serum</h3>
<p>Ginseng + Rétinol</p>
<button onclick="add('Revive Eye Serum',28,'revive-eye-serum.jpeg')">Ajouter</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function add(name,price,image){
    cart.push({name,price,image,qty:1});
    localStorage.setItem("cart",JSON.stringify(cart));
    alert("Ajouté au panier !");
}
</script>

</body>
</html>
