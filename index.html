<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MultiGlow Beauty</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#ffe4f0,#fff6f8);
}

/* HEADER + LOGO */
header {
    text-align:center;
    padding:20px;
    background: rgba(255,105,180,0.2);
    backdrop-filter: blur(5px);
}

.logo {
    font-size:28px;
    font-weight:bold;
    color:#ff3d8b;
}

/* PRODUITS */
.container {
    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;
    padding:20px;
}

.product {
    background:white;
    width:250px;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    margin:10px;
    cursor:pointer;
}

.product img {
    width:100%;
    height:200px;
    object-fit:cover;
}

.product h3 {
    text-align:center;
}

.product p {
    text-align:center;
    color:gray;
}

button {
    width:100%;
    padding:10px;
    border:none;
    background:#ff69b4;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">🌸 MultiGlow K-Beauty</div>
<p>Soins coréens glow & hydratation</p>
<a href="panier.html"><button>Voir le panier 🛒</button></a>
</header>

<div class="container">

<!-- PRODUIT 1 -->
<div class="product" onclick="openProduct('serum1.html')">
<img src="IMG_1730.jpeg">
<h3>Sérum Hydratant</h3>
<p>20€</p>
<button onclick="add(event,'Sérum Hydratant',20,'IMG_1730.jpeg')">Ajouter</button>
</div>

<!-- PRODUIT 2 -->
<div class="product" onclick="openProduct('serum2.html')">
<img src="IMG_1728.jpeg">
<h3>Sérum Glow</h3>
<p>25€</p>
<button onclick="add(event,'Sérum Glow',25,'IMG_1728.jpeg')">Ajouter</button>
</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function add(e,name,price,image){
    e.stopPropagation();
    cart.push({name,price,image,qty:1});
    localStorage.setItem("cart",JSON.stringify(cart));
    alert("Ajouté !");
}

function openProduct(page){
    window.location.href = page;
}
</script>

</body>
</html>
