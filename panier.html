<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panier</title>

<style>
body { font-family:Arial; background:#fff6f8; padding:20px; }

h1 { text-align:center; }

.item {
    background:white;
    padding:15px;
    margin:10px auto;
    max-width:400px;
    border-radius:10px;
    text-align:center;
}

.item img {
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}

button {
    margin:5px;
    padding:8px;
    border:none;
    border-radius:8px;
}

.add { background:green; color:white; }
.minus { background:orange; color:white; }
.remove { background:red; color:white; }

.pay {
    background:#635bff;
    color:white;
    width:100%;
    padding:12px;
    font-size:16px;
    margin-top:20px;
}

.total {
    text-align:center;
    font-size:20px;
}
</style>
</head>

<body>

<h1>🛒 Panier</h1>

<div id="cart"></div>

<h2 class="total">Total : <span id="total">0</span> €</h2>

<button class="pay" onclick="pay()">💳 Payer avec Stripe</button>

<button onclick="clearCart()">Vider panier</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function show(){
    let div = document.getElementById("cart");
    let total = 0;
    div.innerHTML = "";

    cart.forEach((item,i)=>{
        total += item.price * item.qty;

        div.innerHTML += `
        <div class="item">
            <img src="${item.image}">
            <h3>${item.name}</h3>
            <p>${item.price}€ x ${item.qty}</p>

            <button class="add" onclick="qty(${i},1)">+</button>
            <button class="minus" onclick="qty(${i},-1)">-</button>
            <button class="remove" onclick="removeItem(${i})">X</button>
        </div>
        `;
    });

    document.getElementById("total").innerText = total;
    localStorage.setItem("cart",JSON.stringify(cart));
}

function qty(i,v){
    cart[i].qty += v;
    if(cart[i].qty<=0) cart.splice(i,1);
    show();
}

function removeItem(i){
    cart.splice(i,1);
    show();
}

function clearCart(){
    cart=[];
    show();
}

function pay(){
    window.location.href = "https://buy.stripe.com/dRm7sK7b58ZSgq28lb0sU00";
}

show();
</script>

</body>
</html>
