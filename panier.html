<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panier</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fa;
    padding: 20px;
}

h1 {
    text-align: center;
}

.cart-item {
    background: white;
    padding: 15px;
    margin: 10px auto;
    max-width: 400px;
    border-radius: 10px;
}

button {
    margin: 5px;
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.add { background: green; color:white; }
.minus { background: orange; color:white; }
.remove { background: red; color:white; }
.pay { background: #0984e3; color:white; width:100%; padding:12px; font-size:16px; }

.total {
    text-align: center;
    font-size: 20px;
    margin-top: 20px;
}
</style>

</head>

<body>

<h1>🛒 Ton panier</h1>

<div id="cart"></div>

<div class="total">
    Total : <span id="total">0</span> €
</div>

<div style="text-align:center;">
    <button onclick="clearCart()">🗑️ Vider le panier</button>
</div>

<br>

<div style="text-align:center;">
    <button class="pay" onclick="pay()">💳 Payer maintenant</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayCart() {
    let cartDiv = document.getElementById("cart");
    let total = 0;
    cartDiv.innerHTML = "";

    cart.forEach((item, index) => {
        total += item.price * item.qty;

        cartDiv.innerHTML += `
            <div class="cart-item">
                ${item.name} - ${item.price}€ x ${item.qty}
                <br>
                <button class="add" onclick="changeQty(${index},1)">+</button>
                <button class="minus" onclick="changeQty(${index},-1)">-</button>
                <button class="remove" onclick="removeItem(${index})">Supprimer</button>
            </div>
        `;
    });

    document.getElementById("total").innerText = total.toFixed(2);
}

function changeQty(index, change){
    cart[index].qty += change;
    if(cart[index].qty <= 0){
        cart.splice(index,1);
    }
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function removeItem(index){
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function clearCart(){
    cart = [];
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

function pay(){
    alert("Commande validée 🎉");
    cart = [];
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

displayCart();
</script>

</body>
</html>
